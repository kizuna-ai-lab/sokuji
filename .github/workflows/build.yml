name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            name: linux-x64
          - os: ubuntu-latest
            artifact_name: linux-arm64
            name: linux-arm64
            arch: arm64
          - os: windows-latest
            artifact_name: windows
            name: windows
          - os: macos-latest
            artifact_name: macos-arm64
            name: macos-arm64
          - os: macos-15-intel
            artifact_name: macos-x64
            name: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Only need full history for releases (changelog generation)
          fetch-depth: ${{ startsWith(github.ref, 'refs/tags/v') && 0 || 1 }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false
          VITE_BACKEND_URL: 'https://Eburon-api.kizuna.ai'
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ''
          VITE_ENABLE_VOLCENGINE_ST: 'false'
          VITE_ENABLE_VOLCENGINE_AST2: 'false'
          VITE_ENABLE_PALABRA_AI: 'false'
          VITE_ENABLE_DEBUG: ${{ startsWith(github.ref, 'refs/tags/v') && 'false' || '' }}
          VITE_ENABLE_ANALYTICS: ${{ startsWith(github.ref, 'refs/tags/v') && 'true' || '' }}
          VITE_EXTENSION_ID: ''

      - name: Build Electron app with Forge
        if: runner.os != 'macOS'
        run: npx electron-forge make --arch=${{ matrix.arch || 'x64' }}
        env:
          GH_TOKEN: ${{ github.token }}
          CI: false
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ !startsWith(github.ref, 'refs/tags/v') && 'false' || '' }}
          VITE_BACKEND_URL: 'https://Eburon-api.kizuna.ai'
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ''
          VITE_ENABLE_VOLCENGINE_ST: 'false'
          VITE_ENABLE_VOLCENGINE_AST2: 'false'
          VITE_ENABLE_PALABRA_AI: 'false'

      - name: Build macOS PKG with versioned filename
        if: runner.os == 'macOS'
        run: |
          chmod +x build-pkg.sh
          ./build-pkg.sh
        env:
          GH_TOKEN: ${{ github.token }}
          CI: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
          VITE_BACKEND_URL: 'https://Eburon-api.kizuna.ai'
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ''
          VITE_ENABLE_VOLCENGINE_ST: 'false'
          VITE_ENABLE_VOLCENGINE_AST2: 'false'
          VITE_ENABLE_PALABRA_AI: 'false'

      - name: Build Chrome Extension
        if: matrix.os == 'ubuntu-latest' && matrix.arch != 'arm64'
        run: |
          cd extension
          npm ci
          # Build extension with production mode for releases
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            NODE_ENV=production npm run build -- --mode production
            cd dist
            zip -r ../Eburon-extension.zip *
            cd ..
          else
            npm run build
            # Verify the build output exists
            if [ ! -d "dist" ]; then
              echo "Extension build failed: dist directory not found"
              exit 1
            fi
          fi
        env:
          VITE_BACKEND_URL: 'https://Eburon-api.kizuna.ai'
          POSTHOG_KEY: ''
          VITE_ENABLE_VOLCENGINE_ST: 'false'
          VITE_ENABLE_VOLCENGINE_AST2: 'false'
          VITE_ENABLE_PALABRA_AI: 'false'

      - name: Setup Java for Android build
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        if: matrix.os == 'ubuntu-latest'
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        if: matrix.os == 'ubuntu-latest'
        run: npm run android:apk
        env:
          VITE_BACKEND_URL: 'https://Eburon-api.kizuna.ai'
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ''
          VITE_ENABLE_VOLCENGINE_ST: 'false'
          VITE_ENABLE_VOLCENGINE_AST2: 'false'
          VITE_ENABLE_PALABRA_AI: 'false'

      # Release-specific steps
      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/v') && matrix.name == 'linux-x64'
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s")
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s")
          fi
          # Save changelog to a file for the release
          echo "$CHANGELOG" > CHANGELOG.md

      - name: Upload Linux x64 artifacts
        if: startsWith(github.ref, 'refs/tags/v') && matrix.name == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-artifacts
          path: |
            out/make/**/*.deb
            out/make/**/*.zip
            android/app/build/outputs/apk/debug/*.apk
            extension/Eburon-extension.zip
            CHANGELOG.md

      - name: Upload Linux ARM64 artifacts
        if: startsWith(github.ref, 'refs/tags/v') && matrix.name == 'linux-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-artifacts
          path: |
            out/make/**/*.deb
            out/make/**/*.zip

      - name: Upload Windows artifacts
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: out/make/

      - name: Upload macOS artifacts
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-artifacts
          path: out/make/*.pkg

  release:
    # Only run for tag pushes
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-artifacts
          path: linux-x64-artifacts

      - name: Download Linux ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-artifacts
          path: linux-arm64-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: windows-artifacts

      - name: Download macOS ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-artifacts
          path: macos-arm64-artifacts

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-artifacts
          path: macos-x64-artifacts

      - name: Debug artifacts structure
        run: |
          echo "=== Linux x64 ==="
          find linux-x64-artifacts -type f || true
          echo "=== Linux ARM64 ==="
          find linux-arm64-artifacts -type f || true
          echo "=== Windows ==="
          find windows-artifacts -type f || true
          echo "=== macOS ARM64 ==="
          find macos-arm64-artifacts -type f || true
          echo "=== macOS x64 ==="
          find macos-x64-artifacts -type f || true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find linux-x64-artifacts -name "*.deb" -exec cp {} release-assets/ \;
          find linux-x64-artifacts -name "*.zip" -exec cp {} release-assets/ \;
          find linux-x64-artifacts -name "Eburon-extension.zip" -exec cp {} release-assets/ \;
          find linux-arm64-artifacts -name "*.deb" -exec cp {} release-assets/ \;
          find linux-arm64-artifacts -name "*.zip" -exec cp {} release-assets/ \;
          find windows-artifacts -name "*.exe" -exec cp {} release-assets/ \;
          find windows-artifacts -name "*.nupkg" -exec cp {} release-assets/ \;
          find macos-arm64-artifacts -name "*.pkg" -exec cp {} release-assets/ \;
          find macos-x64-artifacts -name "*.pkg" -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: linux-x64-artifacts/CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
