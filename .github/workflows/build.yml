name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            name: linux-x64
          - os: ubuntu-24.04-arm
            artifact_name: linux-arm64
            name: linux-arm64
            arch: arm64
          - os: windows-latest
            artifact_name: windows
            name: windows
          - os: macos-latest
            artifact_name: macos-arm64
            name: macos-arm64
            arch: arm64
          - os: macos-15-intel
            artifact_name: macos-x64
            name: macos-x64
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history for releases (changelog generation). Use string '0'
          # because numeric 0 is falsy in GitHub Actions expressions.
          fetch-depth: ${{ startsWith(github.ref, 'refs/tags/v') && '0' || 1 }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false
          # Use production environment variables for releases, simpler ones for CI
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL_PROD || 'https://sokuji-api.kizuna.ai' }}
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_ENABLE_VOLCENGINE_ST: ${{ secrets.VITE_ENABLE_VOLCENGINE_ST }}
          VITE_ENABLE_VOLCENGINE_AST2: ${{ secrets.VITE_ENABLE_VOLCENGINE_AST2 }}
          VITE_ENABLE_PALABRA_AI: ${{ secrets.VITE_ENABLE_PALABRA_AI }}
          # Additional variables only for releases
          VITE_ENABLE_DEBUG: ${{ startsWith(github.ref, 'refs/tags/v') && 'false' || '' }}
          VITE_ENABLE_ANALYTICS: ${{ startsWith(github.ref, 'refs/tags/v') && 'true' || '' }}
          VITE_EXTENSION_ID: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.VITE_EXTENSION_ID_PROD || '' }}

      - name: Build Electron app with Forge
        if: runner.os == 'Windows'
        run: npx electron-forge make --arch=${{ matrix.arch || 'x64' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: false
          # Prevent actual publishing during CI builds
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ !startsWith(github.ref, 'refs/tags/v') && 'false' || '' }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL_PROD || 'https://sokuji-api.kizuna.ai' }}
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_ENABLE_VOLCENGINE_ST: ${{ secrets.VITE_ENABLE_VOLCENGINE_ST }}
          VITE_ENABLE_VOLCENGINE_AST2: ${{ secrets.VITE_ENABLE_VOLCENGINE_AST2 }}
          VITE_ENABLE_PALABRA_AI: ${{ secrets.VITE_ENABLE_PALABRA_AI }}

      # electron-builder bundles an x86_64-only `fpm` for building .deb packages.
      # On the arm64 runner, install `fpm` via Ruby gem and tell electron-builder
      # to use it via USE_SYSTEM_FPM.
      - name: Install system fpm (arm64 only)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build Linux packages (electron-builder)
        if: runner.os == 'Linux'
        # --publish never: the CI's `release` job uploads artifacts via
        # softprops/action-gh-release. electron-builder auto-publishes on tag
        # builds when GH_TOKEN is set (default policy onTagOrDraft + GitHub
        # provider configured in package.json), which would race with the
        # release job and create duplicate releases. Keep publishing in one
        # place. package.json's `build.publish` is retained because it is
        # still required for `latest-linux*.yml` generation during the build.
        run: npx electron-builder --linux AppImage deb --${{ matrix.arch || 'x64' }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: false
          # Must be literal 'false' (not empty string) on x64 — electron-builder
          # reads this via `(USE_SYSTEM_FPM ?? "false") !== "false"`, and an
          # empty string passes that check (truthy) which skips the bundled-fpm
          # download and then fails on missing system `fpm`.
          USE_SYSTEM_FPM: ${{ matrix.arch == 'arm64' && 'true' || 'false' }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL_PROD || 'https://sokuji-api.kizuna.ai' }}
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_ENABLE_VOLCENGINE_ST: ${{ secrets.VITE_ENABLE_VOLCENGINE_ST }}
          VITE_ENABLE_VOLCENGINE_AST2: ${{ secrets.VITE_ENABLE_VOLCENGINE_AST2 }}
          VITE_ENABLE_PALABRA_AI: ${{ secrets.VITE_ENABLE_PALABRA_AI }}

      - name: Build macOS PKG (electron-builder)
        if: runner.os == 'macOS'
        # --publish never: release job uploads artifacts via softprops/action-gh-release
        # to avoid duplicate releases.
        # -c.directories.output: per-platform output dir (build.directories.output is
        # globally set to out/make-linux for the Linux build).
        # The afterPack hook (scripts/electron-builder-fuses.js) ad-hoc signs the .app
        # since CSC_IDENTITY_AUTO_DISCOVERY=false skips signing entirely.
        run: npx electron-builder --mac pkg --${{ matrix.arch }} --publish never -c.directories.output=out/make-mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL_PROD || 'https://sokuji-api.kizuna.ai' }}
          VITE_ENVIRONMENT: production
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_ENABLE_VOLCENGINE_ST: ${{ secrets.VITE_ENABLE_VOLCENGINE_ST }}
          VITE_ENABLE_VOLCENGINE_AST2: ${{ secrets.VITE_ENABLE_VOLCENGINE_AST2 }}
          VITE_ENABLE_PALABRA_AI: ${{ secrets.VITE_ENABLE_PALABRA_AI }}

      - name: Build Chrome Extension
        if: matrix.os == 'ubuntu-latest' && matrix.arch != 'arm64'
        run: |
          cd extension
          npm ci
          # Build extension with production mode for releases
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            NODE_ENV=production npm run build -- --mode production
            cd dist
            zip -r "../sokuji-extension-${VERSION}.zip" *
            cd ..
          else
            npm run build
            # Verify the build output exists
            if [ ! -d "dist" ]; then
              echo "Extension build failed: dist directory not found"
              exit 1
            fi
          fi
        env:
          # Production environment variables for extension
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL_PROD || 'https://sokuji-api.kizuna.ai' }}
          POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_ENABLE_VOLCENGINE_ST: ${{ secrets.VITE_ENABLE_VOLCENGINE_ST }}
          VITE_ENABLE_VOLCENGINE_AST2: ${{ secrets.VITE_ENABLE_VOLCENGINE_AST2 }}
          VITE_ENABLE_PALABRA_AI: ${{ secrets.VITE_ENABLE_PALABRA_AI }}

      # Release-specific steps
      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/v') && matrix.name == 'linux-x64'
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s")
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s")
          fi
          # Save changelog to a file for the release
          echo "$CHANGELOG" > CHANGELOG.md

      - name: Upload Linux x64 artifacts
        if: startsWith(github.ref, 'refs/tags/v') && matrix.name == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-artifacts
          path: |
            out/make-linux/*.AppImage
            out/make-linux/*.deb
            out/make-linux/latest-linux.yml
            extension/sokuji-extension-*.zip
            CHANGELOG.md

      - name: Upload Linux ARM64 artifacts
        if: startsWith(github.ref, 'refs/tags/v') && matrix.name == 'linux-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-artifacts
          path: |
            out/make-linux/*.AppImage
            out/make-linux/*.deb
            out/make-linux/latest-linux-arm64.yml

      - name: Upload unsigned Windows installer for signing
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          path: out/make/squirrel.windows/x64/*Setup*.exe

      - name: Upload Windows nupkg for release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nupkg
          path: out/make/squirrel.windows/x64/*.nupkg

      - name: Upload macOS artifacts
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-artifacts
          path: |
            out/make-mac/*.pkg

  sign-windows:
    name: Sign Windows artifacts
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'kizuna-ai-lab/sokuji'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download unsigned artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-unsigned
          path: unsigned/

      # SignPath requires a github-artifact-id from upload-artifact.
      # We must re-upload because the original upload happened in a different job
      # and artifact IDs cannot be passed across jobs without explicit output wiring.
      - name: Upload for SignPath
        id: upload-for-signing
        uses: actions/upload-artifact@v4
        with:
          name: windows-to-sign
          path: unsigned/
          overwrite: true

      - name: Submit signing request
        id: sign
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: default
          github-artifact-id: ${{ steps.upload-for-signing.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed/
          wait-for-completion-timeout-in-seconds: 3600

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed
          path: signed/

  release:
    # Only run for tag pushes
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, sign-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-artifacts
          path: linux-x64-artifacts

      - name: Download Linux ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-artifacts
          path: linux-arm64-artifacts

      - name: Download signed Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-signed
          path: windows-signed

      - name: Download Windows nupkg
        uses: actions/download-artifact@v4
        with:
          name: windows-nupkg
          path: windows-nupkg

      - name: Download macOS ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-artifacts
          path: macos-arm64-artifacts

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-artifacts
          path: macos-x64-artifacts

      - name: Debug artifacts structure
        run: |
          echo "=== Linux x64 ==="
          find linux-x64-artifacts -type f || true
          echo "=== Linux ARM64 ==="
          find linux-arm64-artifacts -type f || true
          echo "=== Windows (signed) ==="
          find windows-signed -type f || true
          echo "=== Windows (nupkg) ==="
          find windows-nupkg -type f || true
          echo "=== macOS ARM64 ==="
          find macos-arm64-artifacts -type f || true
          echo "=== macOS x64 ==="
          find macos-x64-artifacts -type f || true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find linux-x64-artifacts -name "*.deb" -exec cp {} release-assets/ \;
          find linux-x64-artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
          find linux-x64-artifacts -name "latest-linux.yml" -exec cp {} release-assets/ \;
          find linux-x64-artifacts -name "sokuji-extension-*.zip" -exec cp {} release-assets/ \;
          find linux-arm64-artifacts -name "*.deb" -exec cp {} release-assets/ \;
          find linux-arm64-artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
          find linux-arm64-artifacts -name "latest-linux-arm64.yml" -exec cp {} release-assets/ \;
          find windows-signed -name "*.exe" -exec cp {} release-assets/ \;
          find windows-nupkg -name "*.nupkg" -exec cp {} release-assets/ \;
          find macos-arm64-artifacts -name "*.pkg" -exec cp {} release-assets/ \;
          find macos-x64-artifacts -name "*.pkg" -exec cp {} release-assets/ \;
          # Squirrel generates filenames with spaces (e.g. "Sokuji-0.15.12 Setup.exe").
          # Rename to use dots so asset names are consistent and latest.yml URLs match.
          cd release-assets
          for f in *' '*; do
            [ -e "$f" ] || continue
            mv "$f" "${f// /.}"
          done
          cd ..
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Generate latest.yml for auto-updater
        run: |
          # Find the signed Windows .exe
          EXE_FILE=$(find release-assets -name "*.exe" | head -1)
          if [ -z "$EXE_FILE" ]; then
            echo "Warning: No .exe found, skipping latest.yml generation"
            exit 0
          fi

          EXE_NAME=$(basename "$EXE_FILE")
          VERSION=${GITHUB_REF_NAME#v}
          SHA512=$(openssl dgst -sha512 -binary "$EXE_FILE" | openssl base64 -A)
          SIZE=$(stat -c%s "$EXE_FILE")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          {
            echo "version: ${VERSION}"
            echo "files:"
            echo "  - url: ${EXE_NAME}"
            echo "    sha512: ${SHA512}"
            echo "    size: ${SIZE}"
            echo "path: ${EXE_NAME}"
            echo "sha512: ${SHA512}"
            echo "releaseDate: '${DATE}'"
          } > release-assets/latest.yml

          echo "=== latest.yml ==="
          cat release-assets/latest.yml

      - name: Generate latest-mac.yml for auto-updater
        # electron-builder's PKG target does not emit latest-mac.yml on its own
        # (only zip/dmg targets set isWriteUpdateInfo=true), so generate it the
        # same way Windows latest.yml is built above. Notify-only context:
        # update-manager.js darwin branch only reads `version` and constructs
        # its own pkgUrl, so files[] just enumerates the per-arch PKGs.
        # electron-updater on macOS always fetches a single latest-mac.yml
        # (no arch suffix), hence one combined file with both arches in files[].
        run: |
          PKGS=()
          while IFS= read -r p; do PKGS+=("$p"); done < <(find release-assets -name "Sokuji-*-*.pkg" | sort)
          if [ ${#PKGS[@]} -eq 0 ]; then
            echo "Warning: No .pkg found, skipping latest-mac.yml generation"
            exit 0
          fi

          VERSION=${GITHUB_REF_NAME#v}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Prefer arm64 for the legacy top-level path/sha512 fields, matching
          # the previous PyYAML merge behavior.
          PRIMARY=""
          for PKG in "${PKGS[@]}"; do
            case "$PKG" in *-arm64.pkg) PRIMARY="$PKG"; break ;; esac
          done
          [ -z "$PRIMARY" ] && PRIMARY="${PKGS[0]}"
          PRIMARY_NAME=$(basename "$PRIMARY")
          PRIMARY_SHA=$(openssl dgst -sha512 -binary "$PRIMARY" | openssl base64 -A)

          {
            echo "version: ${VERSION}"
            echo "files:"
            for PKG in "${PKGS[@]}"; do
              NAME=$(basename "$PKG")
              SHA=$(openssl dgst -sha512 -binary "$PKG" | openssl base64 -A)
              SIZE=$(stat -c%s "$PKG")
              echo "  - url: ${NAME}"
              echo "    sha512: ${SHA}"
              echo "    size: ${SIZE}"
            done
            echo "path: ${PRIMARY_NAME}"
            echo "sha512: ${PRIMARY_SHA}"
            echo "releaseDate: '${DATE}'"
          } > release-assets/latest-mac.yml

          echo "=== latest-mac.yml ==="
          cat release-assets/latest-mac.yml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: linux-x64-artifacts/CHANGELOG.md
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
