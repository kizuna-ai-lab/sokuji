<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Granite 4.0 1B Speech — ASR vs AST Benchmark</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; padding: 24px; line-height: 1.6;
  }
  h1 { color: #00d2ff; margin-bottom: 8px; font-size: 1.5rem; }
  h2 { color: #7b68ee; margin: 24px 0 12px; font-size: 1.2rem; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
  .config {
    background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 20px;
    display: flex; flex-wrap: wrap; gap: 16px; align-items: end;
  }
  .config label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 4px; }
  .config select, .config input {
    background: #0f3460; color: #e0e0e0; border: 1px solid #333;
    border-radius: 4px; padding: 6px 10px; font-size: 0.9rem;
  }
  button {
    background: #00d2ff; color: #000; border: none; border-radius: 6px;
    padding: 10px 24px; font-weight: 600; cursor: pointer; font-size: 0.95rem;
    transition: background 0.2s;
  }
  button:hover { background: #00b8e6; }
  button:disabled { background: #444; color: #888; cursor: not-allowed; }
  #status {
    background: #16213e; border-radius: 8px; padding: 12px 16px;
    margin-bottom: 20px; font-size: 0.9rem;
  }
  #progress-bar {
    height: 4px; background: #333; border-radius: 2px; margin-top: 8px;
    overflow: hidden; display: none;
  }
  #progress-fill { height: 100%; background: #00d2ff; width: 0%; transition: width 0.3s; }
  table {
    width: 100%; border-collapse: collapse; margin-top: 12px;
    background: #16213e; border-radius: 8px; overflow: hidden;
  }
  th { background: #0f3460; color: #00d2ff; padding: 10px 12px; text-align: left; font-size: 0.85rem; }
  td { padding: 8px 12px; border-top: 1px solid #1a1a3e; font-size: 0.85rem; }
  tr:hover td { background: #1a1a3e; }
  .time { font-family: 'Courier New', monospace; color: #ffd700; font-weight: 600; }
  .text { max-width: 400px; word-break: break-word; color: #ccc; }
  .faster { color: #00ff88; font-weight: 600; }
  .slower { color: #ff6b6b; }
  .summary {
    background: #16213e; border-radius: 8px; padding: 16px; margin-top: 20px;
    border-left: 4px solid #7b68ee;
  }
  .log { font-size: 0.8rem; color: #888; margin-top: 4px; }
  .file-input-wrapper { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<h1>Granite 4.0 1B Speech — ASR vs AST Benchmark</h1>
<p class="subtitle">
  Compare inference time between ASR (transcription) and AST (translation) using
  <a href="https://huggingface.co/onnx-community/granite-4.0-1b-speech-ONNX" style="color:#00d2ff">
    onnx-community/granite-4.0-1b-speech-ONNX
  </a> via Transformers.js + WebGPU
</p>

<div class="config">
  <div>
    <label>Quantization</label>
    <select id="dtype">
      <option value="q4" selected>Q4 (smallest, fastest)</option>
      <option value="q4f16">Q4F16</option>
      <option value="q8">Q8 (larger, more accurate)</option>
    </select>
  </div>
  <div>
    <label>Translation Target</label>
    <select id="targetLang">
      <option value="en" selected>English</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="pt">Portuguese</option>
      <option value="ja">Japanese</option>
    </select>
  </div>
  <div>
    <label>Max New Tokens</label>
    <input type="number" id="maxTokens" value="256" min="32" max="1024" step="32" style="width:80px">
  </div>
  <div>
    <label>Rounds per file</label>
    <input type="number" id="rounds" value="3" min="1" max="10" step="1" style="width:60px">
  </div>
  <div>
    <label>Audio Files</label>
    <div class="file-input-wrapper">
      <select id="audioSource">
        <option value="bundled">Bundled test WAVs</option>
        <option value="custom">Upload custom</option>
      </select>
      <input type="file" id="customAudio" accept="audio/*" multiple style="display:none">
    </div>
  </div>
  <div>
    <label>Bundled Files</label>
    <select id="bundledFiles" multiple size="4" style="min-width: 160px;">
      <option value="en.wav" selected>en.wav (3.85s)</option>
      <option value="fr.wav" selected>fr.wav (4.97s)</option>
      <option value="de.wav" selected>de.wav (2.75s)</option>
      <option value="es.wav" selected>es.wav (5.33s)</option>
      <option value="ja.wav" selected>ja.wav (8.16s)</option>
      <option value="pt_br.wav">pt_br.wav (4.60s)</option>
      <option value="zh.wav">zh.wav (4.76s)</option>
      <option value="ko.wav">ko.wav (6.92s)</option>
      <option value="ar.wav">ar.wav (6.55s)</option>
    </select>
  </div>
  <div>
    <button id="runBtn" onclick="runBenchmark()">Run Benchmark</button>
  </div>
</div>

<div id="status">Status: Ready. Click "Run Benchmark" to start.</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="results"></div>

<script type="module">
import {
  AutoProcessor,
  GraniteSpeechForConditionalGeneration,
  TextStreamer,
} from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.0.0-next.7';

// ─── Globals ────────────────────────────────────────────────────────────────

let model = null;
let processor = null;
let isRunning = false;

const TASK_PROMPTS = {
  transcribe:    '<|audio|>Transcribe the speech to text',
  translate_en:  '<|audio|>Translate the speech to English',
  translate_fr:  '<|audio|>Translate the speech to French',
  translate_de:  '<|audio|>Translate the speech to German',
  translate_es:  '<|audio|>Translate the speech to Spanish',
  translate_pt:  '<|audio|>Translate the speech to Portuguese',
  translate_ja:  '<|audio|>Translate the speech to Japanese',
};

const BUNDLED_WAV_BASE = '../model-packs/asr/test-wavs/';

const $ = (id) => document.getElementById(id);

// ─── Audio helpers ──────────────────────────────────────────────────────────

let audioCtx = null;
function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

async function decodeAndResample(arrayBuffer) {
  const ctx = getAudioContext();
  if (ctx.state === 'suspended') await ctx.resume();
  const decoded = await ctx.decodeAudioData(arrayBuffer.slice(0));

  // Mix to mono
  const len = decoded.length;
  const mono = new Float32Array(len);
  for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
    const data = decoded.getChannelData(ch);
    for (let i = 0; i < len; i++) mono[i] += data[i];
  }
  if (decoded.numberOfChannels > 1) {
    for (let i = 0; i < len; i++) mono[i] /= decoded.numberOfChannels;
  }

  // Resample to 16kHz if needed
  if (decoded.sampleRate === 16000) return { samples: mono, duration: decoded.duration };

  const targetLen = Math.ceil((len * 16000) / decoded.sampleRate);
  const offline = new OfflineAudioContext(1, targetLen, 16000);
  const buf = offline.createBuffer(1, len, decoded.sampleRate);
  buf.copyToChannel(mono, 0);
  const src = offline.createBufferSource();
  src.buffer = buf;
  src.connect(offline.destination);
  src.start(0);
  const rendered = await offline.startRendering();
  return { samples: new Float32Array(rendered.getChannelData(0)), duration: decoded.duration };
}

// ─── Model loading ──────────────────────────────────────────────────────────

async function ensureModel() {
  if (model && processor) return;

  const dtype = $('dtype').value;
  setStatus('Loading processor...');
  processor = await AutoProcessor.from_pretrained('onnx-community/granite-4.0-1b-speech-ONNX');

  setStatus('Loading model (this may take a while on first run)...');
  showProgress(true);
  model = await GraniteSpeechForConditionalGeneration.from_pretrained(
    'onnx-community/granite-4.0-1b-speech-ONNX',
    {
      dtype: {
        embed_tokens: dtype,
        audio_encoder: dtype,
        decoder_model_merged: dtype,
      },
      device: 'webgpu',
      progress_callback: (p) => {
        if (p.status === 'progress' && p.total) {
          setProgress((p.loaded / p.total) * 100);
        }
      },
    },
  );
  showProgress(false);
  setStatus('Model loaded.');
}

// ─── Inference ──────────────────────────────────────────────────────────────

async function runInference(audioSamples, taskKey) {
  const content = TASK_PROMPTS[taskKey] || TASK_PROMPTS.transcribe;
  const messages = [{ role: 'user', content }];
  const text = processor.tokenizer.apply_chat_template(messages, {
    add_generation_prompt: true,
    tokenize: false,
  });
  const inputs = await processor(text, audioSamples, { sampling_rate: 16000 });

  let result = '';
  const maxTokens = parseInt($('maxTokens').value) || 256;

  const t0 = performance.now();
  await model.generate({
    ...inputs,
    max_new_tokens: maxTokens,
    streamer: new TextStreamer(processor.tokenizer, {
      skip_prompt: true,
      skip_special_tokens: true,
      callback_function: (chunk) => { result += chunk; },
    }),
  });
  const elapsed = performance.now() - t0;

  return { text: result.trim(), timeMs: elapsed };
}

// ─── Benchmark runner ───────────────────────────────────────────────────────

async function runBenchmark() {
  if (isRunning) return;
  isRunning = true;
  $('runBtn').disabled = true;
  $('results').innerHTML = '';

  try {
    // Check WebGPU
    if (!navigator.gpu) {
      setStatus('WebGPU is not available in this browser.');
      return;
    }

    await ensureModel();

    // Collect audio files
    const audioFiles = await collectAudioFiles();
    if (audioFiles.length === 0) {
      setStatus('No audio files selected.');
      return;
    }

    const targetLang = $('targetLang').value;
    const translateKey = `translate_${targetLang}`;
    const rounds = parseInt($('rounds').value) || 3;
    const results = [];

    // Warmup run (2 inferences to stabilize WebGPU pipeline)
    setStatus('Warmup inference (1/2)...');
    const warmupAudio = audioFiles[0];
    await runInference(warmupAudio.samples, 'transcribe');
    setStatus('Warmup inference (2/2)...');
    await runInference(warmupAudio.samples, translateKey);
    setStatus('Warmup done. Starting benchmark...');

    const totalSteps = audioFiles.length * rounds * 2;
    let step = 0;

    for (let i = 0; i < audioFiles.length; i++) {
      const file = audioFiles[i];
      const asrRuns = [];
      const astRuns = [];

      for (let r = 0; r < rounds; r++) {
        // ASR
        step++;
        setStatus(`[${step}/${totalSteps}] ASR: ${file.name} round ${r + 1}/${rounds}`);
        const asr = await runInference(file.samples, 'transcribe');
        asrRuns.push(asr);

        // AST
        step++;
        setStatus(`[${step}/${totalSteps}] AST (→${targetLang}): ${file.name} round ${r + 1}/${rounds}`);
        const ast = await runInference(file.samples, translateKey);
        astRuns.push(ast);
      }

      const asrTimes = asrRuns.map((r) => r.timeMs);
      const astTimes = astRuns.map((r) => r.timeMs);
      const asrMean = mean(asrTimes);
      const astMean = mean(astTimes);

      results.push({
        name: file.name,
        duration: file.duration,
        rounds,
        asr: {
          times: asrTimes,
          mean: asrMean,
          stddev: stddev(asrTimes, asrMean),
          min: Math.min(...asrTimes),
          max: Math.max(...asrTimes),
          text: asrRuns[asrRuns.length - 1].text,
        },
        ast: {
          times: astTimes,
          mean: astMean,
          stddev: stddev(astTimes, astMean),
          min: Math.min(...astTimes),
          max: Math.max(...astTimes),
          text: astRuns[astRuns.length - 1].text,
        },
        diff: astMean - asrMean,
        ratio: astMean / asrMean,
      });
    }

    renderResults(results, targetLang, rounds);
    setStatus(`Benchmark complete. ${results.length} file(s) x ${rounds} rounds.`);

  } catch (err) {
    setStatus(`Error: ${err.message}`);
    console.error(err);
  } finally {
    isRunning = false;
    $('runBtn').disabled = false;
  }
}

// ─── Audio file collection ──────────────────────────────────────────────────

async function collectAudioFiles() {
  const source = $('audioSource').value;
  const files = [];

  if (source === 'bundled') {
    const selected = Array.from($('bundledFiles').selectedOptions).map((o) => o.value);
    for (const fname of selected) {
      try {
        const resp = await fetch(BUNDLED_WAV_BASE + fname);
        if (!resp.ok) throw new Error(`Failed to fetch ${fname}: ${resp.status}`);
        const buf = await resp.arrayBuffer();
        const { samples, duration } = await decodeAndResample(buf);
        files.push({ name: fname, samples, duration });
      } catch (err) {
        console.warn(`Skipping ${fname}:`, err.message);
      }
    }
  } else {
    const input = $('customAudio');
    for (const f of input.files) {
      const buf = await f.arrayBuffer();
      const { samples, duration } = await decodeAndResample(buf);
      files.push({ name: f.name, samples, duration });
    }
  }

  return files;
}

// ─── Stats helpers ──────────────────────────────────────────────────────────

function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
function stddev(arr, avg) {
  if (arr.length < 2) return 0;
  const variance = arr.reduce((s, v) => s + (v - avg) ** 2, 0) / (arr.length - 1);
  return Math.sqrt(variance);
}
function fmtMs(v) { return v.toFixed(0); }
function fmtPlusMinus(avg, sd) { return `${fmtMs(avg)} \u00B1 ${fmtMs(sd)}`; }

// ─── Results rendering ──────────────────────────────────────────────────────

function renderResults(results, targetLang, rounds) {
  const avgAsrMean = mean(results.map((r) => r.asr.mean));
  const avgAstMean = mean(results.map((r) => r.ast.mean));
  const avgRatio = mean(results.map((r) => r.ratio));
  const avgDiff = mean(results.map((r) => r.diff));

  let html = `
    <h2>Results — ASR vs AST (translate to ${targetLang.toUpperCase()}) &mdash; ${rounds} round${rounds > 1 ? 's' : ''} per file</h2>
    <table>
      <thead>
        <tr>
          <th>File</th>
          <th>Duration</th>
          <th>ASR Mean \u00B1 SD</th>
          <th>ASR Min/Max</th>
          <th>ASR Output</th>
          <th>AST Mean \u00B1 SD</th>
          <th>AST Min/Max</th>
          <th>AST Output</th>
          <th>Diff (ms)</th>
          <th>Ratio</th>
        </tr>
      </thead>
      <tbody>
  `;

  for (const r of results) {
    const diffClass = r.diff > 0 ? 'slower' : 'faster';
    const diffSign = r.diff > 0 ? '+' : '';
    html += `
      <tr>
        <td>${r.name}</td>
        <td class="time">${r.duration.toFixed(1)}s</td>
        <td class="time">${fmtPlusMinus(r.asr.mean, r.asr.stddev)}ms</td>
        <td class="time" style="font-size:0.75rem">${fmtMs(r.asr.min)}/${fmtMs(r.asr.max)}</td>
        <td class="text">${escHtml(r.asr.text)}</td>
        <td class="time">${fmtPlusMinus(r.ast.mean, r.ast.stddev)}ms</td>
        <td class="time" style="font-size:0.75rem">${fmtMs(r.ast.min)}/${fmtMs(r.ast.max)}</td>
        <td class="text">${escHtml(r.ast.text)}</td>
        <td class="time ${diffClass}">${diffSign}${r.diff.toFixed(0)}ms</td>
        <td class="time">${r.ratio.toFixed(2)}x</td>
      </tr>
    `;
  }

  html += `</tbody></table>`;

  // Per-round detail table
  html += `
    <h2>Per-Round Detail</h2>
    <table>
      <thead>
        <tr>
          <th>File</th>
          ${Array.from({length: rounds}, (_, i) => `<th>R${i+1} ASR</th><th>R${i+1} AST</th>`).join('')}
        </tr>
      </thead>
      <tbody>
  `;
  for (const r of results) {
    html += `<tr><td>${r.name}</td>`;
    for (let i = 0; i < rounds; i++) {
      html += `<td class="time">${fmtMs(r.asr.times[i])}ms</td>`;
      html += `<td class="time">${fmtMs(r.ast.times[i])}ms</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table>`;

  // Summary
  const summaryDiffClass = avgDiff > 0 ? 'slower' : 'faster';
  html += `
    <div class="summary">
      <h2>Summary (${rounds} rounds)</h2>
      <p><strong>Average ASR time:</strong> <span class="time">${fmtMs(avgAsrMean)}ms</span></p>
      <p><strong>Average AST time:</strong> <span class="time">${fmtMs(avgAstMean)}ms</span></p>
      <p><strong>Average diff:</strong> <span class="time ${summaryDiffClass}">${avgDiff > 0 ? '+' : ''}${fmtMs(avgDiff)}ms</span></p>
      <p><strong>Average ratio (AST/ASR):</strong> <span class="time">${avgRatio.toFixed(2)}x</span></p>
      <p class="log">
        AST is ${avgRatio > 1 ? (avgRatio.toFixed(2) + 'x slower') : ((1/avgRatio).toFixed(2) + 'x faster')} than ASR on average across ${results.length} file(s) x ${rounds} round(s).
        ${avgDiff > 0
          ? 'Translation adds ~' + fmtMs(avgDiff) + 'ms overhead per inference.'
          : 'Translation is faster by ~' + fmtMs(Math.abs(avgDiff)) + 'ms per inference.'}
      </p>
    </div>
  `;

  $('results').innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── UI helpers ─────────────────────────────────────────────────────────────

function setStatus(msg) { $('status').textContent = 'Status: ' + msg; }
function setProgress(pct) { $('progress-fill').style.width = pct + '%'; }
function showProgress(show) { $('progress-bar').style.display = show ? 'block' : 'none'; }

// Audio source toggle
$('audioSource').addEventListener('change', () => {
  const isCustom = $('audioSource').value === 'custom';
  $('customAudio').style.display = isCustom ? 'inline-block' : 'none';
  $('bundledFiles').style.display = isCustom ? 'none' : 'block';
});

// Expose for onclick
window.runBenchmark = runBenchmark;
</script>

</body>
</html>
